<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>STEP 3D模型查看器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            overflow: hidden;
            touch-action: none;
        }
        
        #canvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
        
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #007AFF;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        #loading p {
            color: #fff;
            margin-top: 20px;
            font-size: 14px;
        }
        
        #info {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 12px;
            z-index: 100;
        }
        
        #controls {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 100;
        }
        
        .control-btn {
            width: 40px;
            height: 40px;
            background: rgba(0,0,0,0.7);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .control-btn:hover {
            background: rgba(0,122,255,0.8);
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <p>加载3D模型中...</p>
    </div>
    
    <canvas id="canvas"></canvas>
    
    <div id="info">
        <div>顶点数: <span id="vertexCount">0</span></div>
        <div>面数: <span id="faceCount">0</span></div>
        <div>尺寸: <span id="modelSize">0</span> mm</div>
    </div>
    
    <div id="controls">
        <button class="control-btn" onclick="resetCamera()">⟳</button>
        <button class="control-btn" onclick="toggleWireframe()">◻</button>
        <button class="control-btn" onclick="zoomIn()">+</button>
        <button class="control-btn" onclick="zoomOut()">-</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // 全局变量
        let scene, camera, renderer, model;
        let isWireframe = false;
        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        
        // 初始化场景
        function init() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                45, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);
            
            // 创建渲染器
            const canvas = document.getElementById('canvas');
            renderer = new THREE.WebGLRenderer({ 
                canvas: canvas, 
                antialias: true,
                alpha: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            // 添加灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 20, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            const backLight = new THREE.DirectionalLight(0xffffff, 0.3);
            backLight.position.set(-10, 10, -10);
            scene.add(backLight);
            
            // 添加网格
            const gridHelper = new THREE.GridHelper(10, 20, 0x444444, 0x222222);
            scene.add(gridHelper);
            
            // 添加坐标轴
            const axesHelper = new THREE.AxesHelper(3);
            scene.add(axesHelper);
            
            // 加载示例模型（立方体作为演示）
            loadDemoModel();
            
            // 添加事件监听
            setupControls();
            
            // 隐藏加载提示
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 1000);
            
            // 开始渲染
            animate();
        }
        
        // 加载演示模型
        function loadDemoModel() {
            // 创建一个复杂的演示模型
            const geometry = new THREE.BoxGeometry(2, 3, 2);
            
            // 添加圆角效果（简化版）
            const material = new THREE.MeshPhongMaterial({
                color: 0x007AFF,
                shininess: 100,
                specular: 0xffffff
            });
            
            model = new THREE.Mesh(geometry, material);
            model.castShadow = true;
            model.receiveShadow = true;
            
            // 添加边框
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0xffffff });
            const wireframe = new THREE.LineSegments(edges, lineMaterial);
            model.add(wireframe);
            
            scene.add(model);
            
            // 更新信息
            updateModelInfo(geometry);
        }
        
        // 更新模型信息
        function updateModelInfo(geometry) {
            const vertices = geometry.attributes.position.count;
            const faces = geometry.index ? geometry.index.count / 3 : vertices / 3;
            
            document.getElementById('vertexCount').textContent = vertices;
            document.getElementById('faceCount').textContent = Math.floor(faces);
            
            // 计算模型尺寸
            geometry.computeBoundingBox();
            const box = geometry.boundingBox;
            const size = new THREE.Vector3();
            box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            document.getElementById('modelSize').textContent = (maxDim * 50).toFixed(1);
        }
        
        // 设置控制器
        function setupControls() {
            const canvas = document.getElementById('canvas');
            
            // 鼠标/触摸事件
            canvas.addEventListener('mousedown', onMouseDown);
            canvas.addEventListener('mousemove', onMouseMove);
            canvas.addEventListener('mouseup', onMouseUp);
            canvas.addEventListener('mouseleave', onMouseUp);
            
            canvas.addEventListener('touchstart', onTouchStart);
            canvas.addEventListener('touchmove', onTouchMove);
            canvas.addEventListener('touchend', onTouchEnd);
            
            // 滚轮缩放
            canvas.addEventListener('wheel', onWheel);
            
            // 窗口大小变化
            window.addEventListener('resize', onWindowResize);
        }
        
        // 鼠标事件处理
        function onMouseDown(e) {
            isDragging = true;
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        
        function onMouseMove(e) {
            if (!isDragging) return;
            
            const deltaX = e.clientX - previousMousePosition.x;
            const deltaY = e.clientY - previousMousePosition.y;
            
            // 旋转模型
            if (model) {
                model.rotation.y += deltaX * 0.01;
                model.rotation.x += deltaY * 0.01;
            }
            
            previousMousePosition = { x: e.clientX, y: e.clientY };
        }
        
        function onMouseUp() {
            isDragging = false;
        }
        
        // 触摸事件处理
        function onTouchStart(e) {
            if (e.touches.length === 1) {
                isDragging = true;
                previousMousePosition = { 
                    x: e.touches[0].clientX, 
                    y: e.touches[0].clientY 
                };
            }
        }
        
        function onTouchMove(e) {
            if (!isDragging || e.touches.length !== 1) return;
            
            const deltaX = e.touches[0].clientX - previousMousePosition.x;
            const deltaY = e.touches[0].clientY - previousMousePosition.y;
            
            if (model) {
                model.rotation.y += deltaX * 0.01;
                model.rotation.x += deltaY * 0.01;
            }
            
            previousMousePosition = { 
                x: e.touches[0].clientX, 
                y: e.touches[0].clientY 
            };
        }
        
        function onTouchEnd() {
            isDragging = false;
        }
        
        // 滚轮缩放
        function onWheel(e) {
            e.preventDefault();
            
            const zoomSpeed = 0.1;
            if (e.deltaY < 0) {
                // 放大
                camera.position.multiplyScalar(1 - zoomSpeed);
            } else {
                // 缩小
                camera.position.multiplyScalar(1 + zoomSpeed);
            }
            
            camera.lookAt(scene.position);
        }
        
        // 窗口大小变化
        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 可以在这里添加模型动画
            if (model) {
                // model.rotation.y += 0.002;
            }
            
            renderer.render(scene, camera);
        }
        
        // 控制函数
        function resetCamera() {
            camera.position.set(5, 5, 5);
            camera.lookAt(0, 0, 0);
            
            if (model) {
                model.rotation.set(0, 0, 0);
            }
        }
        
        function toggleWireframe() {
            isWireframe = !isWireframe;
            
            if (model && model.material) {
                model.material.wireframe = isWireframe;
            }
        }
        
        function zoomIn() {
            camera.position.multiplyScalar(0.9);
            camera.lookAt(scene.position);
        }
        
        function zoomOut() {
            camera.position.multiplyScalar(1.1);
            camera.lookAt(scene.position);
        }
        
        // 初始化
        init();
    </script>
</body>
</html>
